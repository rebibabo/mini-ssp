# Mini-SSP Docker 服务：Kafka + Prometheus + Grafana
#
# MySQL 和 Redis 继续用 brew，不放 Docker（保留已有数据）
#
# 推荐用根目录的 start.sh 启动（它会同时处理 brew + Docker + Java app）
# 直接用 compose 命令：
#   只起 Kafka：    docker compose --profile kafka up -d
#   只起监控：       docker compose --profile metrics up -d
#   全部：          docker compose --profile kafka --profile metrics up -d
#   停止：          docker compose --profile kafka --profile metrics down

services:
  kafka:
    profiles: [kafka]
    image: apache/kafka:3.9.0
    container_name: mini-ssp-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_HEAP_OPTS: "-Xmx512m -Xms256m"
    deploy:
      resources:
        limits:
          memory: 1g

  prometheus:
    profiles: [metrics]
    image: prom/prometheus:v2.55.1
    container_name: mini-ssp-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    profiles: [metrics]
    image: grafana/grafana:11.4.0
    container_name: mini-ssp-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    depends_on:
      - prometheus
